<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>測試 CORS fetch</title>
</head>
<body>
  <button id="getBtn">GET 測試</button>
  <button id="postBtn">POST 測試</button>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwxTUj0xTHEbYnPwD8CbZ0t53EGfnL3Td27tXjm0RTmDC3DFahssY3zFBUzXrMAfKar/exec";

    // GET 請求
    document.getElementById("getBtn").addEventListener("click", async () => {
      try {
        const res = await fetch(https://script.google.com/macros/s/AKfycbwxTUj0xTHEbYnPwD8CbZ0t53EGfnL3Td27tXjm0RTmDC3DFahssY3zFBUzXrMAfKar/exec);
        const data = await res.json();
        console.log("GET 回傳：", data);
      } catch (err) {
        console.error("GET 失敗：", err);
      }
    });

    // POST 請求
    document.getElementById("postBtn").addEventListener("click", async () => {
      try {
        const payload = { name: "瞬", action: "測試" };
        const res = await fetch(https://script.google.com/macros/s/AKfycbwxTUj0xTHEbYnPwD8CbZ0t53EGfnL3Td27tXjm0RTmDC3DFahssY3zFBUzXrMAfKar/exec, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        console.log("POST 回傳：", data);
      } catch (err) {
        console.error("POST 失敗：", err);
      }
    });
  </script>
</body>
</html>
