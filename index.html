<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>方案A 進階版問卷</title>
<style>
button { margin: 5px; }
#question-container { margin-bottom: 20px; }
#result, #summary, #job-list { margin-top: 20px; }
</style>
</head>
<body>

<h2 id="question-title">請回答以下問題：</h2>
<div id="question-container"></div>

<div id="user-info" style="display:none;">
  <h3>請填寫資料</h3>
  <input id="name" placeholder="姓名"><br>
  <input id="phone" placeholder="電話"><br>
  <button id="submit">送出資料</button>
</div>

<div id="summary"></div>
<div id="job-list"></div>
<div id="youtube-placeholder">
  <!-- 影片播放器位置預留 -->
  <p>影片播放區塊 (待嵌入 YouTube)</p>
</div>

<script>
// ======= 問卷題目設定 =======
const questions = [
  {text:"1. 年齡？", options:["20以下","21-30","31-40","41以上"], key:"age"},
  {text:"2. 生活圈？", options:["虎尾","斗六","北港","林內","西螺","莿桐","二崙","其他"], key:"circle"},
  {text:"3. 工作經驗？", options:["無","勞力型","靜態型"], key:"experience"},
  {text:"4. 勞力型職業？", options:["粗工","其他"], key:"labor"},
  {text:"5. 靜態型職業？", options:["行政","其他"], key:"static"},
  {text:"6. 上班時段？", options:["日班","夜班"], key:"shift"},
  // ... 7~14題省略，可照上面格式補
  {text:"13. 備註1？", options:["是","否"], key:"extra1"},
  {text:"14. 備註2？", options:["是","否"], key:"extra2"}
];

let currentQuestion = 0;
let answers = {};

// ======= 顯示題目 =======
function showQuestion() {
  const q = questions[currentQuestion];
  const container = document.getElementById("question-container");
  document.getElementById("question-title").innerText = q.text;
  container.innerHTML = "";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => {
      answers[q.key] = opt;
      currentQuestion++;
      if(currentQuestion < questions.length) {
        showQuestion();
      } else {
        // 題目答完，顯示填寫姓名電話表單
        document.getElementById("question-container").style.display = "none";
        document.getElementById("user-info").style.display = "block";
        showSummary();
      }
    };
    container.appendChild(btn);
  });
}

// ======= 顯示文字總結 =======
function showSummary() {
  const summaryDiv = document.getElementById("summary");
  summaryDiv.innerHTML = `
    <h3>您的選擇總結：</h3>
    <p>您是生活在${answers.circle || ""}，以前從事勞力型職業:${answers.labor || ""}，
    這次想要找靜態型職業:${answers.static || ""}，
    上班時段希望是${answers.shift || ""}，
    且希望在同個鄉鎮。</p>
  `;
}

// ======= 資料庫職缺範例 =======
const jobData = [
  {category:"行政", company:"魚鄉有限公司", position:"行政人員", salary:"30000~32000", location:"麥寮鄉"},
  {category:"行政", company:"恣肆有限公司", position:"行政助理", salary:"29500~34000", location:"台西鄉"},
  {category:"勞力", company:"大力工程", position:"工地助手", salary:"28000~30000", location:"虎尾鎮"},
  // 可新增更多資料列
];

// ======= 顯示對應職缺 =======
function showJobList() {
  const jobDiv = document.getElementById("job-list");
  const category = answers.static; // 根據使用者選擇分類抓取資料
  const filtered = jobData.filter(j => j.category === category).slice(0,3);

  if(filtered.length === 0) {
    jobDiv.innerHTML = "<p>目前沒有相關職缺</p>";
    return;
  }

  let html = <h3>以下是您感興趣的 "${category}" 的相關職缺：</h3><ol>;
  filtered.forEach(j => {
    html += <li>${j.company}: ${j.position}<br>月薪 ${j.salary}, ${j.location}</li>;
  });
  html += "</ol>";
  jobDiv.innerHTML = html;
}

// ======= 送出資料到 Apps Script =======
document.getElementById("submit").addEventListener("click", async () => {
  const data = {
    ...answers,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value
  };

  try {
    const response = await fetch("你的WebApp URL", {
      method:"POST",
      body:JSON.stringify(data),
      headers:{"Content-Type":"application/json"}
    });
    const result = await response.json();
    if(result.status === "success") {
      document.getElementById("user-info").innerHTML = "<p>資料已送出成功！</p>";
      showJobList(); // 送出成功後顯示職缺
    } else {
      document.getElementById("user-info").innerHTML = "<p>送出失敗：" + result.message + "</p>";
    }
  } catch(err) {
    document.getElementById("user-info").innerHTML = "<p>送出失敗：" + err + "</p>";
  }
});

// ======= 啟動問卷 =======
showQuestion();
</script>
</body>
</html>
