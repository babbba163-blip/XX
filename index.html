<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>方案A 完整問卷</title>
<style>
  body { margin:0; padding:0; font-family: Arial; }
  #question-container { position:relative; width:100%; height:100vh; }
  button { cursor:pointer; }
  #user-info { display:none; margin-top:20px; }
  #summary, #job-list { margin-top:20px; }
  #youtube-placeholder { margin-top:20px; }
  input { margin:5px 0; padding:5px; font-size:16px; width:200px; }
</style>
</head>
<body>

<div id="question-container"></div>

<div id="user-info">
  <h3>請填寫資料</h3>
  <input id="name" placeholder="姓名"><br>
  <input id="phone" placeholder="電話"><br>
  <button id="submit">送出資料</button>
</div>

<div id="summary"></div>
<div id="job-list"></div>
<div id="youtube-placeholder">
  <p>影片播放區塊 (待嵌入 YouTube)</p>
</div>

<script>
// ======= 問卷題目設定（14題示範） =======
const questions = [
  {text:"1. 年齡？", options:["18-29歲","30-44歲","45-64歲","65歲以上"], key:"age"},
  {text:"2. 生活圈？", options:["虎尾","斗六","北港","林內","西螺","莿桐","二崙","其他"], key:"circle"},
  {text:"3. 工作經驗？", options:["無","勞力型","靜態型"], key:"experience"},
  {text:"4. 勞力型職業？", options:["粗工","其他"], key:"labor"},
  {text:"5. 靜態型職業？", options:["行政","其他"], key:"static"},
  {text:"6. 上班時段？", options:["日班","夜班"], key:"shift"},
  {text:"7. 題目7", options:["選項A","選項B"], key:"q7"},
  {text:"8. 題目8", options:["選項A","選項B"], key:"q8"},
  {text:"9. 題目9", options:["選項A","選項B"], key:"q9"},
  {text:"10. 題目10", options:["選項A","選項B"], key:"q10"},
  {text:"11. 題目11", options:["選項A","選項B"], key:"q11"},
  {text:"12. 題目12", options:["選項A","選項B"], key:"q12"},
  {text:"13. 備註1？", options:["是","否"], key:"extra1"},
  {text:"14. 備註2？", options:["是","否"], key:"extra2"}
];

let currentQuestion = 0;
let answers = {};

// ======= 顯示題目 (響應式按鈕版) =======
function showQuestionResponsive() {
  const q = questions[currentQuestion];
  const container = document.getElementById("question-container");
  container.innerHTML = "";

  // Title 區塊
  const titleHeight = 200;
  const title = document.createElement("div");
  title.innerText = q.text;
  title.style.position = "absolute";
  title.style.top = "0px";
  title.style.left = "50%";
  title.style.transform = "translateX(-50%)";
  title.style.height = titleHeight + "px";
  title.style.width = "90%";
  title.style.textAlign = "center";
  title.style.fontSize = "24px";
  container.appendChild(title);

  // 按鈕位置計算
  const paddingX = 100;  // 左右邊距
  const startY = titleHeight + 150; // 從頂部算起
  const endY = window.innerHeight - 100; // 底部留白100
  const optionCount = q.options.length;
  const optionHeight = (endY - startY)/optionCount;

  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.style.position = "absolute";
    btn.style.left = paddingX + "px";
    btn.style.top = startY + i*optionHeight + "px";
    btn.style.width = (window.innerWidth - 2*paddingX) + "px";
    btn.style.height = optionHeight + "px";
    btn.style.fontSize = "18px";
    btn.onclick = () => {
      answers[q.key] = opt;
      currentQuestion++;
      if(currentQuestion < questions.length) {
        showQuestionResponsive();
      } else {
        container.style.display = "none";
        document.getElementById("user-info").style.display = "block";
        showSummary();
      }
    };
    container.appendChild(btn);
  });
}

// ======= 顯示文字總結 =======
function showSummary() {
  const summaryDiv = document.getElementById("summary");
  summaryDiv.innerHTML = `
    <h3>您的選擇總結：</h3>
    <p>您是生活在${answers.circle || ""}，
    以前從事勞力型職業:${answers.labor || ""}，
    這次想要找靜態型職業:${answers.static || ""}，
    上班時段希望是${answers.shift || ""}，
    且希望在同個鄉鎮。</p>
  `;
}

// ======= 顯示職缺 (由 Web App 提供) =======
function showJobListDynamic(jobArray) {
  const jobDiv = document.getElementById("job-list");
  if(jobArray.length === 0){
    jobDiv.innerHTML = "<p>目前沒有相關職缺</p>";
    return;
  }

  let html = <h3>以下是您感興趣的 "${answers.static}" 的相關職缺：</h3><ol>;
  jobArray.slice(0,3).forEach(j => {
    html += <li>${j.company}: ${j.position}<br>月薪 ${j.salary}, ${j.location}</li>;
  });
  html += "</ol>";
  jobDiv.innerHTML = html;
}

// ======= 送出資料到 Apps Script =======
document.getElementById("submit").addEventListener("click", async () => {
  const data = {
    ...answers,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value
  };

  try {
    const response = await fetch("你的WebApp URL", {
      method:"POST",
      body:JSON.stringify(data),
      headers:{"Content-Type":"application/json"}
    });
    const result = await response.json();
    if(result.status === "success") {
      document.getElementById("user-info").innerHTML = "<p>資料已送出成功！</p>";
      showJobListDynamic(result.data); // 使用 Web App 回傳資料
    } else {
      document.getElementById("user-info").innerHTML = "<p>送出失敗：" + result.message + "</p>";
    }
  } catch(err) {
    document.getElementById("user-info").innerHTML = "<p>送出失敗：" + err + "</p>";
  }
});

// ======= 啟動問卷 =======
document.addEventListener("DOMContentLoaded", () => {
  showQuestionResponsive();
});

// ======= 畫面大小改變時自動調整按鈕 =======
window.addEventListener("resize", () => {
  if(currentQuestion < questions.length) showQuestionResponsive();
});
</script>

</body>
</html>
