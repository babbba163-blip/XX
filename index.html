<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>問卷測試</title>
<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
}
#question-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  height: 100%;
  width: 100%;
  padding: 20px;
  box-sizing: border-box;
}
#question-container h2 {
  margin: 0 0 20px 0;
  text-align: center;
}
.button-container {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 80%;
  flex-grow: 1; /* 讓按鈕區域占滿剩餘空間 */
  justify-content: center; /* 垂直置中按鈕 */
}
button {
  padding: 20px;
  font-size: 18px;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="question-container">
</div>

<script>
const questions = [
  {text:"1. 年齡？", options:["20以下","21-30","31-40","41以上"], key:"age"},
  {text:"2. 生活圈？", options:["虎尾","斗六","北港","林內","西螺","莿桐","二崙","其他"], key:"circle"}
];

let currentQuestion = 0;
let answers = {};

function showQuestion() {
  const container = document.getElementById("question-container");
  container.innerHTML = "";

  const title = document.createElement("h2");
  title.innerText = questions[currentQuestion].text;
  container.appendChild(title);

  const btnContainer = document.createElement("div");
  btnContainer.className = "button-container";
  container.appendChild(btnContainer);

  questions[currentQuestion].options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => {
      answers[questions[currentQuestion].key] = opt;
      currentQuestion++;
      if(currentQuestion < questions.length){
        showQuestion();
      } else {
        container.innerHTML = "<h2>問卷完成</h2><pre>" + JSON.stringify(answers, null, 2) + "</pre>";
      }
    };
    btnContainer.appendChild(btn);
  });
}

document.addEventListener("DOMContentLoaded", showQuestion);
</script>

</body>
</html>
